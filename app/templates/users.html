<!DOCTYPE html>
<html>
<head>
    <title>Manage Users</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: Arial, sans-serif; background: #1a1a2e; color: white; padding: 2rem; }
        h2 { color: white; margin-bottom: 1rem; }
        table { width: 100%; border-collapse: collapse; background: #16213e; border-radius: 8px; overflow: hidden; }
        th, td { padding: 12px 16px; text-align: left; border-bottom: 1px solid #0f3460; }
        th { background: #0f3460; }
        .add-form { background: #16213e; padding: 1.5rem; border-radius: 8px; margin: 1rem 0 2rem 0; display: flex; gap: 10px; flex-wrap: wrap; }
        input { padding: 8px 12px; border-radius: 6px; border: none; }
        button { padding: 8px 16px; border-radius: 6px; border: none; cursor: pointer; }
        .add-btn { background: #4a90d9; color: white; }
        .del-btn { background: #c0392b; color: white; }
        a { color: #4a90d9; }
        .flash { color: #f39c12; margin-bottom: 1rem; }
    </style>
</head>
<body>
    <h2>Manage Users</h2>
    <a href="/">← Back to Gallery</a>
    {% for msg in get_flashed_messages() %}<p class="flash">{{ msg }}</p>{% endfor %}
    <form method="POST" class="add-form">
        <input type="hidden" name="action" value="add">
        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit" class="add-btn">Add User</button>
    </form>
    <table>
        <tr><th>Username</th><th>Role</th><th>Action</th></tr>
        {% for u in users %}
        <tr>
            <td>{{ u['username'] }}</td>
            <td>{{ 'Admin' if u['is_admin'] else 'Viewer' }}</td>
            <td>
                {% if not u['is_admin'] %}
                <form method="POST">
                    <input type="hidden" name="action" value="delete">
                    <input type="hidden" name="user_id" value="{{ u['id'] }}">
                    <button type="submit" class="del-btn">Delete</button>
                </form>
                {% endif %}
            </td>
        </tr>
        {% endfor %}
    </table>
</body>
</html>
