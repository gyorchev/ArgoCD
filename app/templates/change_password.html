<!DOCTYPE html>
<html>
<head>
    <title>Change Password</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: Arial, sans-serif; background: #1a1a2e; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .box { background: #16213e; padding: 2rem; border-radius: 12px; width: 340px; }
        h2 { color: white; margin-bottom: 1.5rem; text-align: center; }
        label { color: #aaa; font-size: 13px; display: block; margin-bottom: 4px; }
        input { width: 100%; padding: 10px; margin-bottom: 16px; border: 1px solid #0f3460; border-radius: 6px; background: #0f3460; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #4a90d9; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; }
        .flash { padding: 10px; border-radius: 6px; margin-bottom: 1rem; text-align: center; font-size: 14px; }
        .flash.error { background: rgba(220,50,50,0.2); color: #e74c3c; }
        .flash.success { background: rgba(46,204,113,0.2); color: #2ecc71; }
        a { color: #4a90d9; display: block; text-align: center; margin-top: 1rem; font-size: 14px; }
    </style>
</head>
<body>
    <div class="box">
        <h2>🔒 Change Password</h2>
        {% for msg in get_flashed_messages() %}
            <div class="flash {{ 'success' if 'success' in msg.lower() else 'error' }}">{{ msg }}</div>
        {% endfor %}
        <form method="POST">
            <label>Current Password</label>
            <input type="password" name="current_password" required>
            <label>New Password</label>
            <input type="password" name="new_password" required>
            <label>Confirm New Password</label>
            <input type="password" name="confirm_password" required>
            <button type="submit">Change Password</button>
        </form>
        <a href="/">← Back to Gallery</a>
    </div>
</body>
</html>
