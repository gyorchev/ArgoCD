apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mcp-server
  namespace: argocd
  labels:
    app: mcp-server
spec:
  project: default
  source:
    repoURL: https://github.com/gyorchev/ArgoCD.git
    targetRevision: main
    path: mcp-manifests
  destination:
    server: https://kubernetes.default.svc
    namespace: mcp-server
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
